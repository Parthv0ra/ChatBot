<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Master Document Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }

        .pdf-container {
            width: 100%;
            height: 100vh;
            background: #fff;
        }

        #pdf-viewer {
            width: 100%;
            height: 100%;
            border: none;
        }

        .chat-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .chat-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(99, 102, 241, 0.6);
        }

        .chat-button svg {
            width: 30px;
            height: 30px;
            fill: white;
        }

        .chat-window {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 400px;
            height: 600px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: none;
            flex-direction: column;
            z-index: 999;
            overflow: hidden;
        }

        .chat-window.active {
            display: flex;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-header {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .close-chat {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .welcome-message {
            background: #f8f9fa;
            padding: 15px;
            margin: 15px;
            border-radius: 10px;
            font-size: 14px;
            color: #333;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.bot {
            align-items: flex-start;
        }

        .message-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: #6366f1;
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message.bot .message-bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .system-message {
            text-align: center;
            color: #888;
            font-size: 12px;
            font-style: italic;
            margin: 10px 0;
        }

        .quick-suggestions {
            padding: 10px 15px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            background: #f5f5f5;
        }

        .suggestion-btn {
            background: white;
            border: 1px solid #e0e0e0;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #6366f1;
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggestion-btn:hover {
            background: #6366f1;
            color: white;
            border-color: #6366f1;
        }

        .chat-input {
            padding: 15px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .input-container {
            display: flex;
            gap: 10px;
            align-items: center;
            background: #f5f5f5;
            border-radius: 25px;
            padding: 5px 5px 5px 15px;
        }

        .chat-input input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px;
            font-size: 14px;
            outline: none;
        }

        .send-btn {
            background: #6366f1;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: #5558e3;
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .status {
            font-size: 11px;
            color: #888;
            padding: 0 15px 5px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: white;
            border-radius: 15px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #6366f1;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        @media (max-width: 768px) {
            .chat-window {
                width: calc(100% - 20px);
                height: calc(100vh - 120px);
                right: 10px;
                bottom: 90px;
            }
        }
    </style>
</head>
<body>
    <div class="pdf-container">
        <iframe id="pdf-viewer"></iframe>
    </div>

    <div class="chat-button" onclick="toggleChat()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12c0 1.54.36 3 .97 4.29L2 22l5.71-.97C9 21.64 10.46 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm0 18c-1.38 0-2.68-.31-3.85-.85l-.27-.14-2.83.48.48-2.83-.14-.27C4.31 14.68 4 13.38 4 12c0-4.41 3.59-8 8-8s8 3.59 8 8-3.59 8-8 8z"/>
            <circle cx="9" cy="12" r="1"/>
            <circle cx="12" cy="12" r="1"/>
            <circle cx="15" cy="12" r="1"/>
        </svg>
    </div>

    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <h3>✨ AI Master Document Assistant</h3>
            <button class="close-chat" onclick="toggleChat()">×</button>
        </div>

        <div class="welcome-message">
            Hello! I am your AI Master Document Assistant. Ask me about procurement, ERP processes, or PO management.
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="system-message">ℹ️ Connecting to server...</div>
        </div>

        <div class="quick-suggestions">
            <button class="suggestion-btn" onclick="useSuggestion('How to add PO?')">How to add PO?</button>
            <button class="suggestion-btn" onclick="useSuggestion('ERP workflow?')">ERP workflow?</button>
            <button class="suggestion-btn" onclick="useSuggestion('Procurement process?')">Procurement process?</button>
        </div>

        <div class="chat-input">
            <div class="status" id="status">⏳ Connecting...</div>
            <div class="input-container">
                <input type="text" id="messageInput" placeholder="Ask about spend, risk, or invoices..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURE YOUR BACKEND URL HERE
        const API_URL = 'http://localhost:5000'; // Change to your Render backend URL after deployment

        function toggleChat() {
            const chatWindow = document.getElementById('chatWindow');
            chatWindow.classList.toggle('active');
        }

        function useSuggestion(text) {
            document.getElementById('messageInput').value = text;
            sendMessage();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function addMessage(type, text) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text;
            
            messageDiv.appendChild(bubble);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showTyping() {
            const messagesDiv = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typing-indicator';
            typingDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const status = document.getElementById('status');
            const question = input.value.trim();

            if (!question) return;

            addMessage('user', question);
            input.value = '';

            sendBtn.disabled = true;
            status.textContent = '🤔 Thinking...';
            showTyping();

            try {
                const response = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ question: question })
                });

                const data = await response.json();
                removeTyping();

                if (data.error) {
                    addMessage('bot', 'Sorry, I encountered an error: ' + data.error);
                } else {
                    addMessage('bot', data.answer);
                }
            } catch (error) {
                removeTyping();
                addMessage('bot', 'Sorry, I could not connect to the server. Please check if the backend is running.');
            } finally {
                sendBtn.disabled = false;
                status.textContent = '✅ Ready';
            }
        }

        async function checkStatus() {
            try {
                const response = await fetch(`${API_URL}/api/status`);
                const data = await response.json();
                const status = document.getElementById('status');
                const messagesDiv = document.getElementById('chatMessages');
                
                if (data.ready) {
                    status.textContent = '✅ Ready';
                    messagesDiv.innerHTML = '<div class="system-message">ℹ️ Chatbot is ready! Ask your questions.</div>';
                } else {
                    status.textContent = '⏳ Initializing...';
                    messagesDiv.innerHTML = '<div class="system-message">⏳ Chatbot is initializing, please wait...</div>';
                }

                // Load PDF
                document.getElementById('pdf-viewer').src = `${API_URL}/api/pdf`;
            } catch (error) {
                const status = document.getElementById('status');
                const messagesDiv = document.getElementById('chatMessages');
                status.textContent = '❌ Connection Error';
                messagesDiv.innerHTML = '<div class="system-message">❌ Cannot connect to backend. Please check the API_URL in the code.</div>';
            }
        }

        checkStatus();
        setInterval(checkStatus, 30000); // Check every 30 seconds
    </script>
</body>
</html>
